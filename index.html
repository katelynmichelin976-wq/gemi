<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="忆海拾光">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0ea5e9">
<meta name="description" content="老年认知训练 — 看图识物">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>忆海拾光</title>
<style>
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-touch-callout: none;   /* iOS 长按菜单 */
  -webkit-user-select: none;     /* 文字选中 */
  user-select: none;
}
/* 设置页输入框恢复文字选中和输入 */
input[type=text], textarea { -webkit-user-select: text; user-select: text; }
/* 图片禁止拖拽和长按保存 */
img { -webkit-user-drag: none; pointer-events: none; }

:root {
  /* Ocean blue theme */
  --ocean:      #0ea5e9;
  --ocean-dk:   #0284c7;
  --ocean-bg:   #f0f9ff;
  --ocean-lt:   rgba(14,165,233,0.12);
  --bg:         #f0f9ff;
  --surf:       #ffffff;
  --surf2:      #e0f2fe;
  --text:       #0c2340;
  --text2:      #4a7fa5;
  --text3:      #93c5d9;
  --bd:         rgba(14,165,233,0.15);
  --bd2:        rgba(14,165,233,0.28);
  --blue:       #0ea5e9;
  --blue-bg:    #e0f2fe;
  --blue-lt:    rgba(14,165,233,0.13);
  --green:      #059669;
  --green-bg:   #ecfdf5;
  --green-bd:   #6ee7b7;
  --diamond:    #0ea5e9;
  --diamond2:   #bae6fd;
  --r:          22px;
  --rsm:        16px;
  --sh:         0 1px 10px rgba(14,165,233,0.1), 0 3px 20px rgba(14,165,233,0.06);
  /* Safe area — 集中定义，统一引用 */
  --safe-top:    env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
}
html.dark {
  --ocean:      #38bdf8;
  --ocean-dk:   #0ea5e9;
  --ocean-bg:   #0c1e2e;
  --bg:         #071520;
  --surf:       #0d2035;
  --surf2:      #112840;
  --text:       #e0f2fe;
  --text2:      #7ec8e3;
  --text3:      #2d5a7a;
  --bd:         rgba(56,189,248,0.12);
  --bd2:        rgba(56,189,248,0.22);
  --blue:       #38bdf8;
  --blue-bg:    #112840;
  --blue-lt:    rgba(56,189,248,0.15);
  --green-bg:   #042014;
  --green-bd:   #065f46;
  --diamond:    #38bdf8;
  --diamond2:   #0c4a6e;
  --sh:         0 2px 20px rgba(0,0,0,0.5);
}

html {
  height: -webkit-fill-available;
}
html, body { overflow:hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;
  -webkit-font-smoothing: antialiased;
  height: 100dvh;
  height: -webkit-fill-available;
  position: relative;
}

/* ════════════════════════════════
   SCREENS — stacked, shown by class
   ════════════════════════════════ */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center;
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s;
  transform: translateX(30px);
}
.screen.active {
  opacity: 1; pointer-events: auto; transform: translateX(0);
}
.screen.exit-left {
  opacity: 0; transform: translateX(-30px);
}

/* ════════════════════════════════
   HOME SCREEN
   ════════════════════════════════ */
#screen-home { justify-content: flex-start; overflow: hidden; }

.home-scroll {
  flex: 1; width: 100%; max-width: 500px;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 0 16px;
  display: flex; flex-direction: column;
}

/* ── Ocean-blue top bar ── */
.home-topbar {
  width: 100%;
  padding: calc(10px + var(--safe-top)) 16px 14px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  background: var(--bg);
}
.home-title {
  font-size: 24px; font-weight: 800; letter-spacing: -.4px;
  color: var(--ocean);
}
.home-title-wrap {
  display: flex; align-items: baseline; gap: 6px;
}
.home-version {
  font-size: 11px; font-weight: 600;
  color: var(--text3); letter-spacing: .02em;
  margin-bottom: 1px;
}
.home-refresh-btn {
  background: none; border: none; cursor: pointer; padding: 3px;
  -webkit-tap-highlight-color: transparent;
  color: var(--text3); display: flex; align-items: center;
  border-radius: 6px;
  transition: color .15s, transform .3s;
  align-self: center;
}
.home-refresh-btn:active { color: var(--ocean); }
.home-refresh-btn.spinning svg {
  animation: spin360 .6s ease-out;
}
@keyframes spin360 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Right icon cluster */
.home-icons {
  display: flex; align-items: center; gap: 2px;
}
.home-icon-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 10px; border-radius: 100px;
  background: none; border: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background .15s;
}
.home-icon-btn:active { background: var(--surf2); }
.home-icon-emoji { font-size: 18px; line-height: 1; }
.home-icon-count {
  font-size: 14px; font-weight: 800;
  color: var(--ocean);
}

/* Gear button */
.home-gear-btn {
  padding: 6px 8px; border-radius: 100px;
  background: none; border: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  color: var(--text3);
  display: flex; align-items: center;
  transition: background .15s;
}
.home-gear-btn:active { background: var(--surf2); }

.home-section { width: 100%; padding: 16px 0 0; flex: 1; display: flex; flex-direction: column; }

/* Deck cards */
.deck-grid {
  flex: 1;
  display: flex; flex-direction: column; gap: 0;
  background: var(--surf); border-radius: var(--r);
  overflow: hidden; border: 1px solid var(--bd); box-shadow: var(--sh);
}
.deck-grid:empty, .deck-grid:has(.empty-state) {
  background: none; border: none; box-shadow: none;
}
.deck-card {
  background: var(--surf); cursor: pointer;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  transition: background .12s;
  display: flex; align-items: center; padding: 20px 18px;
  border-bottom: 0.5px solid var(--bd);
}
.deck-card:last-child { border-bottom: none; }
.deck-card:active { background: var(--surf2); }
.deck-card.selected { background: var(--blue-bg); }
.deck-info { flex:1; min-width: 0; }
.deck-name { font-size: 18px; font-weight: 600; color: var(--text); transition: color .15s; }
.deck-card.selected .deck-name { color: var(--blue); }

/* Due / New count columns */
.deck-stats { display: flex; gap: 22px; align-items: center; flex-shrink: 0; }
.deck-stat  { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 32px; }
.deck-stat-num { font-size: 18px; font-weight: 700; line-height: 1; }
.deck-stat-num.due  { color: var(--blue); }
.deck-stat-num.new-c{ color: var(--green); }
.deck-stat-lbl { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; }

/* Start footer — browse (secondary) + start (primary) */
.home-footer {
  width: 100%; max-width: 500px; flex-shrink: 0;
  padding: 14px 16px calc(12px + var(--safe-bottom));
  background: var(--bg);
}
.footer-btns {
  display: flex; gap: 10px; align-items: stretch;
}
.browse-btn {
  flex: 1;          /* 1/3 of total width (1 vs 2) */
  height: 62px; border-radius: var(--r);
  border: 2px solid var(--bd2);
  background: var(--surf); color: var(--text2);
  font-family: inherit; font-size: 16px; font-weight: 700;
  cursor: pointer; outline: none;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  transition: background .15s, transform .1s;
}
.browse-btn:active { transform: scale(.97); background: var(--surf2); }
.start-btn {
  flex: 2;          /* 2/3 of total width */
  height: 62px; border-radius: var(--r); border: none;
  background: var(--ocean); color: #fff;
  font-family: inherit; font-size: 18px; font-weight: 800;
  cursor: pointer; outline: none;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  transition: transform .1s;
  box-shadow: 0 4px 0 var(--ocean-dk);
}
.start-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--ocean-dk); }

/* ════════════════════════════════
   QUIZ SCREEN
   ════════════════════════════════ */
#screen-quiz { overflow:hidden; }

/* ── Top bar: back + progress ── */
.bar {
  width:100%; max-width:500px; flex-shrink:0;
  display:flex; align-items:center; gap:12px;
  padding: calc(10px + var(--safe-top)) 16px 12px;
}
.back-btn {
  background:none; border:none; cursor:pointer; padding:4px;
  -webkit-tap-highlight-color:transparent;
  color:var(--text2); display:flex; align-items:center; flex-shrink:0;
}
.ptrack { flex:1; height:8px; background:var(--bd2); border-radius:4px; overflow:hidden; }
.pfill  { height:100%; background:var(--ocean); border-radius:4px; transition:width .55s cubic-bezier(.4,0,.2,1); }

.gear-btn {
  background:none; border:none; cursor:pointer; padding:4px;
  -webkit-tap-highlight-color:transparent;
  color:var(--text2); display:flex; align-items:center; flex-shrink:0;
}

/* ── Image zone: full-width square, NEVER changes size ── */
.img-zone {
  width:100%; max-width:500px; flex-shrink:0;
  padding:0 16px;
}
.target-card-wrap {
  width:100%; aspect-ratio:1/1;
  position:relative;
}

/* ── Middle zone: shared by opts and answer-panel ── */
.mid-zone {
  flex:1; min-height:0;
  width:100%; max-width:500px;
  padding:0 16px;
  display:flex; flex-direction:column;
}

/* legacy .content used for slide animation */
.content {
  flex:1; min-height:0;
  width:100%; max-width:500px;
  display:flex; flex-direction:column;
  gap:10px;
  transition:opacity .2s, transform .2s;
}

/* Image wrapper — same inset as mid-zone */
.img-zone {
  flex-shrink:0;
  padding:0 16px;
}

/* Mid zone: fills everything between image and btm */
.mid-zone {
  flex:1; min-height:0;
  padding:0 16px 8px;
  display:flex; flex-direction:column;
  justify-content:flex-end;
}

/* Target card — 1:1 square, capped height, always fixed */
.target-card {
  background:var(--surf2);
  border-radius:var(--r);
  border:1px solid var(--bd);
  box-shadow:var(--sh);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; overflow:hidden; padding:0; position:relative;
  width:100%; aspect-ratio:1/1;
  max-height:44vh;
}
.target-card > .target-img { border-radius:var(--r); overflow:hidden; }
.revealed .target-card { box-shadow:var(--sh); }

.target-img {
  width:100%; height:100%;
  border-radius:var(--r);
  background:var(--surf2);
  display:flex; align-items:center; justify-content:center;
  font-size:clamp(80px, 25vh, 180px); line-height:1;
  overflow:hidden;
  animation:imgPop .38s cubic-bezier(.34,1.56,.64,1);
}
/* Real photo: fills square, cropped to center */
.target-img img {
  width:100%; height:100%;
  object-fit:contain; object-position:center;
  display:block; border-radius:var(--r);
}
@keyframes imgPop{from{transform:scale(.78);opacity:0}to{transform:scale(1);opacity:1}}
.instr {
  display:flex; align-items:center; justify-content:center;
  gap:7px; transition:opacity .3s; flex-shrink:0; padding:2px 0;
}
.dots { display:flex; gap:4px; }
.dot  { width:7px; height:7px; border-radius:50%; background:var(--ocean); animation:dp 1.5s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:.17s}.dot:nth-child(3){animation-delay:.34s}
@keyframes dp{0%,70%,100%{transform:scale(.5);opacity:.3}35%{transform:scale(1);opacity:1}}
.instr-txt { font-size:14px; color:var(--text2); font-weight:500; }

/* Options zone — explicit height matching image; buttons fill it */
.opts-zone {
  width:100%; flex-shrink:0;
  display:flex; flex-direction:column;
  background:var(--surf); border-radius:var(--r);
  border:1px solid var(--bd); padding:10px;
  height:var(--opts-zone-h, auto);
  user-select:none; -webkit-user-select:none;
}
.opts {
  flex:1;
  display:flex; flex-direction:column; gap:10px;
}
.opt {
  flex:1; height:var(--opt-btn-h, auto);
  background:#fff; border:2.5px solid var(--ocean);
  border-radius:var(--rsm); cursor:pointer; outline:none;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  transition:border-color .18s, background .18s, transform .1s, opacity .2s;
  user-select:none; -webkit-user-select:none;
}
.opt:active{ transform:scale(.97); background:var(--blue-bg); }
.otxt {
  font-size:var(--fs-opt, 26px); font-weight:700; letter-spacing:var(--ls-opt, .06em);
  color:var(--text); text-align:center; line-height:1.3;
  word-break:keep-all; transition:color .18s;
  padding:0 16px;
}

/* Phrase input in settings */
.phrase-input {
  width:100%; padding:9px 12px;
  border:1.5px solid var(--bd2); border-radius:10px;
  background:var(--surf2); color:var(--text);
  font-family:inherit; font-size:15px;
  outline:none; transition:border-color .15s;
}
.phrase-input:focus { border-color:var(--ocean); }
.rpl  { position:absolute; border-radius:50%; background:var(--blue-lt); transform:scale(0); animation:rout .5s ease-out forwards; pointer-events:none; }
@keyframes rout{to{transform:scale(5);opacity:0}}
.opt.sel { border-color:var(--ocean); background:var(--blue-bg); }
.opt.sel .otxt { color:var(--ocean); }
.opt.sel::after { content:''; position:absolute; inset:-3px; border-radius:calc(var(--rsm)+4px); border:2px solid var(--ocean); animation:blink 2s ease infinite; pointer-events:none; }
@keyframes blink{0%{opacity:.55;transform:scale(1)}100%{opacity:0;transform:scale(1.02)}}
.opt.correct { border-color:var(--green); background:var(--green-bg); }
.opt.correct .otxt { color:var(--green); }
.opt.correct::after { display:none; }
.opt.wrong  { border-color:var(--bd2); background:var(--surf2); opacity:.35; }
.opt.wrong::after { display:none; }
.opt.dim    { opacity:.25; pointer-events:none; }
.opt.dim::after { display:none; }

/* Answer panel — fills mid-zone, same space as opts-zone */
.answer-panel {
  flex:1; min-height:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:var(--surf); border-radius:var(--r);
  border:1px solid var(--bd); box-shadow:var(--sh);
  padding:18px 20px 14px; overflow:hidden;
  opacity:0; transform:scale(.96);
  transition:opacity .3s, transform .3s cubic-bezier(.34,1.56,.64,1);
}
.answer-panel.show { opacity:1; transform:scale(1); }
.answer-word {
  font-size:var(--fs-ans, 48px); font-weight:800; letter-spacing:var(--ls-ans, -1px);
  color:var(--text); line-height:1; text-align:center;
  flex-shrink:0; margin-bottom:14px;
}
.answer-details {
  width:100%; display:flex; flex-direction:column;
  gap:7px; overflow:hidden; flex-shrink:1;
}
.detail-item {
  display:flex; align-items:flex-start; gap:10px;
  padding:9px 13px; background:var(--surf2); border-radius:12px;
  flex-shrink:0; opacity:0; transform:translateY(6px);
  transition:opacity .3s, transform .3s;
}
.detail-item.show { opacity:1; transform:translateY(0); }
.detail-dot { width:6px; height:6px; border-radius:50%; background:var(--ocean); flex-shrink:0; margin-top:8px; }
.detail-txt { font-size:var(--fs-hint, 15px); font-weight:500; color:var(--text2); line-height:1.5; letter-spacing:var(--ls-hint, 0); }

/* Bottom — collapses when nxtbtn hidden */
.btm {
  width:100%; max-width:500px; flex-shrink:0;
  padding: 0 16px;
  display:flex; flex-direction:column;
}
.btm:has(.nxtbtn.show) {
  padding: 8px 16px calc(12px + var(--safe-bottom));
}
/* Fallback for Safari < 15.4 without :has */
.btm.active {
  padding: 8px 16px calc(12px + var(--safe-bottom));
}
/* Submit button — hidden (auto-submit replaces it) */
.subbtn { display:none !important; }
.ntip {
  position:absolute; bottom:calc(100% + 9px); left:50%;
  transform:translateX(-50%) scale(.9);
  background:var(--text); color:var(--bg);
  font-size:13px; font-weight:500; padding:8px 16px;
  border-radius:11px; white-space:nowrap;
  opacity:0; pointer-events:none;
  transition:opacity .2s, transform .2s; z-index:20;
}
.ntip::after { content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:var(--text); }
.ntip.show { opacity:1; transform:translateX(-50%) scale(1); }
@keyframes ndg{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.ndg{animation:ndg .32s ease}

/* nxtbtn: hidden during quiz, shown after answer — no animation */
.nxtbtn {
  width:100%; height:66px; border-radius:var(--r); border:none;
  background:var(--ocean); color:#fff;
  font-family:inherit; font-size:var(--fs-btn, 20px); font-weight:800; letter-spacing:var(--ls-btn, 0);
  cursor:pointer; outline:none;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  display:none; align-items:center; justify-content:center; gap:10px;
  position:relative; overflow:hidden; flex-shrink:0;
  box-shadow:0 4px 0 var(--ocean-dk);
}
.nxtbtn.show {
  display:flex;
}
.nxtbtn:active { transform:translateY(2px); box-shadow:0 2px 0 var(--ocean-dk); }
.nring-svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
.nring-t { fill:none; stroke:transparent; stroke-width:3; }
.nring-p { fill:none; stroke:transparent; stroke-width:3; stroke-linecap:round; }
.nxtbtn.counting .nring-t { stroke:rgba(255,255,255,.14); }
.nxtbtn.counting .nring-p { stroke:rgba(255,255,255,.72); }
.nring-lbl { position:relative; z-index:1; }
.nring-sec { position:relative; z-index:1; font-size:13px; font-weight:600; opacity:.6; min-width:16px; }

/* Slide */
.content { transition:opacity .2s, transform .2s; }
.sout{opacity:0;transform:translateX(-22px)}
.sin {opacity:0;transform:translateX(22px)}

/* ════════════════════════════════
   SETTINGS DRAWER — Tab layout
   ════════════════════════════════ */
.settings-overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0); pointer-events:none;
  transition:background .28s;
}
.settings-overlay.open { background:rgba(0,0,0,0.38); pointer-events:auto; }
.settings-sheet {
  position:absolute; bottom:0; left:50%;
  transform:translateX(-50%) translateY(100%);
  width:100%; max-width:500px;
  background:var(--surf); border-radius:24px 24px 0 0;
  border-top:0.5px solid var(--bd);
  padding-bottom: calc(16px + var(--safe-bottom));
  transition:transform .32s cubic-bezier(.32,1,.36,1);
  display:flex; flex-direction:column;
  max-height:82vh;
}
.settings-overlay.open .settings-sheet { transform:translateX(-50%) translateY(0); }
.sheet-handle { width:36px; height:4px; border-radius:2px; background:var(--bd2); margin:12px auto 6px; flex-shrink:0; }
/* Tab bar */
.sheet-tabs {
  display:flex; border-bottom:1px solid var(--bd);
  flex-shrink:0; padding:0 16px;
}
.sheet-tab {
  flex:1; text-align:center;
  padding:10px 4px 9px;
  font-size:13px; font-weight:600; color:var(--text3);
  cursor:pointer; border-bottom:2px solid transparent;
  transition:color .15s, border-color .15s;
  -webkit-tap-highlight-color:transparent;
}
.sheet-tab.active { color:var(--ocean); border-bottom-color:var(--ocean); }
/* Tab panels */
.sheet-panels { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.sheet-panel { display:none; padding:0 0 8px; }
.sheet-panel.active { display:block; }
/* Rows */
.sheet-section { padding:14px 20px 0; }
.sheet-section-lbl { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:10px; }
.sheet-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:0.5px solid var(--bd); }
.sheet-row:last-child { border-bottom:none; }
.sheet-row-lbl { flex:1; font-size:15px; font-weight:500; color:var(--text); }
.sheet-row-val { font-size:14px; font-weight:700; color:var(--blue); min-width:34px; text-align:right; }
.sheet-row input[type=range] { width:120px; accent-color:var(--blue); cursor:pointer; }
.stoggle { position:relative; width:44px; height:26px; flex-shrink:0; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.stoggle input { opacity:0; width:0; height:0; position:absolute; }
.stoggle-track { position:absolute; inset:0; background:var(--bd2); border-radius:13px; transition:background .25s; }
.stoggle input:checked + .stoggle-track { background:var(--blue); }
.stoggle-thumb { position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.25); transition:transform .25s cubic-bezier(.34,1.56,.64,1); pointer-events:none; }
.stoggle input:checked ~ .stoggle-thumb { transform:translateX(18px); }

/* Confetti + jelly */
#cc { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:999; }
@keyframes jelly{0%,100%{transform:scale(1)}20%{transform:scale(1.14,.86)}40%{transform:scale(.89,1.11)}60%{transform:scale(1.06,.95)}80%{transform:scale(.98,1.02)}}
.jly{animation:jelly .42s ease}

/* Icon SVG helper */
.ico { display:inline-flex; align-items:center; justify-content:center; }

@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* 空状态 */
.empty-state {
  flex: 1;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding: 40px 24px; gap:12px; text-align:center;
}
.empty-state-icon { font-size:48px; line-height:1; }
.empty-state-title { font-size:18px; font-weight:700; color:var(--text); }
.empty-state-sub { font-size:14px; color:var(--text2); line-height:1.6; }

/* 牌组删除按钮 */
.deck-del-btn {
  background:none; border:none; cursor:pointer; padding:6px;
  color:var(--text3); border-radius:8px; flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
  transition:color .15s, background .15s;
  display:flex; align-items:center;
}
.deck-del-btn:active { color:var(--red, #e53e3e); background:var(--surf2); }
</style>
</head>

<div class="screen" id="screen-quiz">

<script>
// ── 导入牌组存储（localStorage + 内存）─────────────────────────
// 内部卡片格式：{ id, img, name, options:[4项], correct:0-3, details:[] }
// options 和 correct 在 getDeck() 时动态生成，img 为 blob URL

const DECKS = {};        // key → cards[]，运行时填充
let DECKS_META = [];     // [{ key, name }]，运行时从 localStorage 恢复

// 备用词库：牌组卡片不足4张时补充干扰项
const FALLBACK_WORDS = ['苹果','香蕉','椅子','水壶','钥匙','手机','眼镜','雨伞','毛巾','牙刷',
  '西瓜','胡萝卜','土豆','玉米','火车','汽车','飞机','冰箱','电视','桌子'];

// 内置测试牌组（Emoji 图片，无需导入，始终存在）
const BUILTIN_KEY = '__builtin_test__';
const BUILTIN_DECK = [
  { id:'b01', name:'苹果',   img:'🍎', audioUrl:'', details:['红红的，圆圆的，很甜', '水果，可以直接吃'] },
  { id:'b02', name:'香蕉',   img:'🍌', audioUrl:'', details:['黄色弯弯的', '剥皮吃，软软的很甜'] },
  { id:'b03', name:'椅子',   img:'🪑', audioUrl:'', details:['有靠背，用来坐的', '吃饭的时候要坐椅子'] },
  { id:'b04', name:'水壶',   img:'🫖', audioUrl:'', details:['用来烧水的', '热水壶，水开了再喝'] },
  { id:'b05', name:'钥匙',   img:'🔑', audioUrl:'', details:['用来开门的', '出门一定要带好钥匙'] },
  { id:'b06', name:'手机',   img:'📱', audioUrl:'', details:['可以打电话，也可以看视频', '充电才能用'] },
  { id:'b07', name:'眼镜',   img:'👓', audioUrl:'', details:['戴上可以看清楚', '近视的人需要戴'] },
  { id:'b08', name:'雨伞',   img:'☂️', audioUrl:'', details:['下雨天撑伞，能挡雨', '出门看天气'] },
  { id:'b09', name:'毛巾',   img:'🧣', audioUrl:'', details:['用来擦脸擦手的', '洗完脸用它擦干'] },
  { id:'b10', name:'牙刷',   img:'🪥', audioUrl:'', details:['用来刷牙的', '每天早晚都要用'] },
  { id:'b11', name:'西瓜',   img:'🍉', audioUrl:'', details:['绿色大大的，红色的瓤', '夏天吃很解渴'] },
  { id:'b12', name:'胡萝卜', img:'🥕', audioUrl:'', details:['橙色长长的，营养很好', '可以生吃也可以炒着吃'] },
  { id:'b13', name:'土豆',   img:'🥔', audioUrl:'', details:['黄褐色圆圆的', '炒着吃，也能做土豆泥'] },
  { id:'b14', name:'玉米',   img:'🌽', audioUrl:'', details:['黄色长长的，一粒一粒的', '可以煮着吃'] },
  { id:'b15', name:'火车',   img:'🚂', audioUrl:'', details:['在铁轨上跑的', '可以去很远的地方'] },
  { id:'b16', name:'汽车',   img:'🚗', audioUrl:'', details:['四个轮子，坐车出门', '需要驾照才能开'] },
  { id:'b17', name:'飞机',   img:'✈️', audioUrl:'', details:['在天上飞的', '去很远的地方要坐飞机'] },
  { id:'b18', name:'冰箱',   img:'🧊', audioUrl:'', details:['放食物保鲜的', '冷冷的，食物放进去不容易坏'] },
  { id:'b19', name:'电视',   img:'📺', audioUrl:'', details:['看节目用的', '新闻电视剧都能看'] },
  { id:'b20', name:'桌子',   img:'🍽️', audioUrl:'', details:['吃饭放东西用的', '有四条腿，饭菜放桌上'] },
];

// 运行时生成 options + correct（始终生成4个选项供 OPT_COUNT 取用）
function buildOptions(card, allCards) {
  const pool = allCards
    .filter(c => c.id !== card.id)
    .map(c => c.name);
  // Fisher-Yates shuffle
  for(let k = pool.length-1; k > 0; k--){
    const r = Math.floor(Math.random()*(k+1));
    [pool[k], pool[r]] = [pool[r], pool[k]];
  }
  // 同牌组不足3个时才从备用词库补充
  if (pool.length < 3) {
    FALLBACK_WORDS.forEach(w => {
      if (pool.length >= 3) return;
      if (!pool.includes(w) && w !== card.name) pool.push(w);
    });
  }
  const distractors = pool.slice(0, 3);
  const options = [card.name, ...distractors];
  return { options, correct: 0 };
}

function getDeck(key) {
  const raw = DECKS[key] || [];
  return raw.map(card => {
    const { options, correct } = buildOptions(card, raw);
    return { ...card, options, correct };
  });
}

// ── IndexedDB 媒体缓存 ───────────────────────────────────────────
const IDB_NAME = 'yihai_media', IDB_VER = 1, IDB_STORE = 'blobs';

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, IDB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function saveMedia(key, blob) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(blob, key);
    tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
  });
}
async function loadMedia(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const req = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(key);
    req.onsuccess = e => res(e.target.result || null);
    req.onerror   = e => rej(e.target.error);
  });
}
async function deleteMediaForDeck(deckKey) {
  const db = await openDB();
  const allKeys = await new Promise((res, rej) => {
    const req = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).getAllKeys();
    req.onsuccess = e => res(e.target.result); req.onerror = e => rej(e.target.error);
  });
  const tx = db.transaction(IDB_STORE, 'readwrite');
  const st = tx.objectStore(IDB_STORE);
  allKeys.filter(k => k.startsWith(deckKey + '_')).forEach(k => st.delete(k));
  return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = e => rej(e.target.error); });
}

async function restoreDecks() {
  try {
    const idx = JSON.parse(localStorage.getItem(LS_INDEX) || '[]');
    DECKS_META = idx;
    for (const { key } of idx) {
      const raw = JSON.parse(localStorage.getItem(LS_DECK_PREFIX + key) || '[]');
      const cards = [];
      for (const c of raw) {
        const card = { ...c, img: '', audioUrl: '', details: [] };
        // 从 IndexedDB 恢复图片
        const imgBlob = await loadMedia(`${key}_${c.id}_img`).catch(() => null);
        if (imgBlob) card.img = URL.createObjectURL(imgBlob);
        // 从 IndexedDB 恢复录音
        const audBlob = await loadMedia(`${key}_${c.id}_aud`).catch(() => null);
        if (audBlob) card.audioUrl = URL.createObjectURL(audBlob);
        cards.push(card);
      }
      DECKS[key] = cards;
    }
  } catch(e) { console.warn('restoreDecks failed', e); }
  // 始终注入内置测试牌组
  DECKS[BUILTIN_KEY] = BUILTIN_DECK;
  if (!DECKS_META.find(m => m.key === BUILTIN_KEY)) {
    DECKS_META.push({ key: BUILTIN_KEY, name: '🧪 测试牌组', builtin: true });
  }
}

// ── .yhspack 导入 ────────────────────────────────────────────────
function ldScript(src) {
  return new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function importYhspack(file) {
  try {
    await ldScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
    const zip = await JSZip.loadAsync(await file.arrayBuffer());

    const jsonFile = zip.file('deck.json');
    if (!jsonFile) { alert('格式错误：未找到 deck.json'); return; }
    const deckData = JSON.parse(await jsonFile.async('string'));
    const deck = deckData.deck;
    if (!deck || !deck.cards) { alert('格式错误：deck.cards 不存在'); return; }

    const key = deck.id || ('deck_' + Date.now());
    const name = deck.name || file.name.replace('.yhspack','');
    const cards = [];

    for (let i = 0; i < deck.cards.length; i++) {
      const c = deck.cards[i];
      if (!c.name) continue;
      const card = { id: c.id || String(i), name: c.name, img: '', audioUrl: '', details: [] };

      // 图片
      if (c.image) {
        const imgFile = zip.file(c.image);
        if (imgFile) {
          const buf = await imgFile.async('arraybuffer');
          const blob = new Blob([buf], { type: 'image/jpeg' });
          card.img = URL.createObjectURL(blob);
          await saveMedia(`${key}_${card.id}_img`, blob).catch(() => {});
        }
      }

      // 录音
      if (c.audio) {
        const audFile = zip.file(c.audio);
        if (audFile) {
          const buf = await audFile.async('arraybuffer');
          const ext = (c.audio.split('.').pop() || 'm4a').toLowerCase();
          const mime = {'m4a':'audio/mp4','mp4':'audio/mp4','mp3':'audio/mpeg',
                        'ogg':'audio/ogg','webm':'audio/webm','aac':'audio/aac'}[ext] || 'audio/mp4';
          const blob = new Blob([buf], { type: mime });
          card.audioUrl = URL.createObjectURL(blob);
          await saveMedia(`${key}_${card.id}_aud`, blob).catch(() => {});
        }
      }

      cards.push(card);
    }

    if (!cards.length) { alert('未找到有效卡片'); return; }

    // 写入内存
    DECKS[key] = cards;
    // 更新或追加 meta
    const existing = DECKS_META.findIndex(m => m.key === key);
    if (existing >= 0) DECKS_META[existing] = { key, name };
    else DECKS_META.push({ key, name });

    // 持久化（只存 id+name，blob URL 不存）
    saveDeckIndex();
    saveDeckCards(key, cards);

    // 刷新首页列表，选中刚导入的牌组
    renderDeckList();
    updateDeckStats();
    const el = document.querySelector(`.deck-card[data-deck="${key}"]`);
    if (el) selectDeck(el);

    showImportToast(name, cards.length);
  } catch(e) {
    alert('导入失败：' + e.message);
    console.error(e);
  }
}

function showImportToast(name, count) {
  const t = document.createElement('div');
  t.textContent = `✓ 已导入「${name}」${count} 张`;
  t.style.cssText = `position:fixed;bottom:calc(100px + var(--safe-bottom));left:50%;
    transform:translateX(-50%);background:var(--text);color:var(--bg);
    padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;
    z-index:999;white-space:nowrap;animation:toastIn .3s ease`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// Simulated SRS stats — in a real app these come from a spaced-repetition engine.
// For now: "due" = cards whose last-seen date <= today, "new" = never seen.
function getDeckStats(key) {
  if (key === 'random') return { due: null, new: null };
  const seen   = JSON.parse(localStorage.getItem(`seen_${key}`)  || '{}');
  const deck   = DECKS[key] || [];
  const today  = new Date().toDateString();
  let due = 0, newC = 0;
  deck.forEach((_, i) => {
    const s = seen[i];
    if (!s) { newC++; }
    else if (s.next && new Date(s.next) <= new Date()) { due++; }
  });
  return { due, new: newC };
}

function updateDeckStats() {
  DECKS_META.filter(m => m.key !== 'random').forEach(m => {
    const stats = getDeckStats(m.key);
    const dueEl = document.querySelector(`.deck-stat-num.due[data-deck="${m.key}"]`);
    const newEl = document.querySelector(`.deck-stat-num.new-c[data-deck="${m.key}"]`);
    if (dueEl) dueEl.textContent = stats.due > 0 ? stats.due : '0';
    if (newEl) newEl.textContent = stats.new > 0 ? stats.new : '0';
  });
}

let voices = [];
let speechReady = false;

function loadVoices() {
  const v = speechSynthesis.getVoices();
  if (v.length) voices = v;
}
loadVoices();
if (typeof speechSynthesis.onvoiceschanged !== 'undefined') {

// iOS: warm up speech engine on first user gesture
// Call this inside any click/touch handler before the first real speak
function warmupSpeech() {
  if (speechReady) return;
  speechReady = true;
  const utt = new SpeechSynthesisUtterance('');
  utt.volume = 0;
  speechSynthesis.speak(utt);
  // Also try loading voices now (iOS sometimes loads them after user gesture)
  setTimeout(() => { loadVoices(); }, 300);
}

function pickVoice() {
  if (!voices.length) loadVoices();
  // 优先使用用户指定的音色
  if (TTS_VOICE_NAME) {
    const named = voices.find(v => v.name === TTS_VOICE_NAME);
    if (named) return named;
  }
  return voices.find(v => v.lang === 'zh-CN')
      || voices.find(v => v.lang === 'zh-TW')
      || voices.find(v => v.lang.startsWith('zh'))
      || (voices.length ? voices[0] : null);
}

function speak(text, delay = 0, onend = null) {
  speechSynthesis.cancel();
  const go = () => {
    if (!voices.length) loadVoices();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'zh-CN';
    utt.rate = TTS_RATE;
    utt.pitch = TTS_PITCH;
    utt.volume = 1;
    const v = pickVoice();
    if (v) utt.voice = v;
    if (onend) utt.onend = onend;
    speechSynthesis.speak(utt);
    setTimeout(() => {
      if (speechSynthesis.paused) speechSynthesis.resume();
    }, 250);
  };
  if (delay > 0) setTimeout(go, delay);
  else go();
}

// 播放答案语音：优先录音，无录音降级 TTS
function playAnswer(q, onend) {
  if (q.audioUrl) {
    setTimeout(() => {
      const audio = new Audio(q.audioUrl);
      currentAudio = audio;
      if (onend) audio.onended = () => { currentAudio = null; onend(); };
      audio.onerror = () => { currentAudio = null; speakDirect(q.name, onend); };
      audio.play().catch(() => { currentAudio = null; speakDirect(q.name, onend); });
    }, 80);
  } else {
    speakDirect(q.name, onend);
  }
}

// speak 不带 cancel，避免打断刚恢复的引擎
function speakDirect(text, onend) {
  if (!voices.length) loadVoices();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'zh-CN'; utt.rate = TTS_RATE; utt.pitch = TTS_PITCH; utt.volume = 1;
  const v = pickVoice(); if (v) utt.voice = v;
  if (onend) utt.onend = onend;
  speechSynthesis.speak(utt);
  setTimeout(() => { if (speechSynthesis.paused) speechSynthesis.resume(); }, 250);
}
function speakSequence(items, onDone, pause = 350) {
  if (!items || items.length === 0) { if (onDone) onDone(); return; }
  const [first, ...rest] = items;
  speak(first, 0, () => {
    if (rest.length > 0) setTimeout(() => speakSequence(rest, onDone, pause), pause);
    else { setTimeout(() => { if (onDone) onDone(); }, pause); }
  });
}

// 选项提示：把文案中的{A}{B}{C}{D}替换为实际选项后依次播报
// 选项提示：解析文案中的 {A}{B}{C} 和停顿符 .（一个.=400ms）
// 示例文案：请在{A}.{B}.{C}中选择一个
function speakOptHint(opts) {
  if (!opts || !opts.length) return;
  const labels = ['A','B','C','D'];
  const PAUSE_MS = 100; // 每个 . 的停顿时长

  // 第一步：把通配符替换为实际选项文字
  let text = PHRASE_OPT_HINT;
  opts.forEach((opt, i) => {
    if (i < labels.length) text = text.replace(`{${labels[i]}}`, opt);
  });
  // 移除未被替换的多余通配符
  text = text.replace(/\{[A-D]\}/g, '');

  // 第二步：按停顿符 . 拆分成片段
  const parts = [];
  const re = /([^.]+)|(\.+)/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m[1]) {
      const t = m[1].trim();
      if (t) parts.push({ type: 'text', val: t });
    } else if (m[2]) {
      parts.push({ type: 'pause', ms: m[2].length * PAUSE_MS });
    }
  }

  // 第三步：顺序播报，pause 片段用 setTimeout 插入停顿
  function playParts(arr) {
    if (!arr.length) return;
    const [head, ...tail] = arr;
    if (head.type === 'pause') {
      setTimeout(() => playParts(tail), head.ms);
    } else {
      speakDirect(head.val, () => playParts(tail));
    }
  }
  playParts(parts);
}

  // img 字段：URL（blob/http/data）用 <img>，Emoji 或空值用 textContent

  if (imgSrc.length > 4) {
    timg.innerHTML = `<img src="${imgSrc}" alt="${q.name}" onerror="this.parentNode.textContent='🖼️'">`;
  } else {
    timg.textContent = imgSrc;
  }

  // Browse mode: skip options, auto-reveal
  if (q.browse) {
    document.getElementById('opts-zone').style.display = 'none';
    document.getElementById('content').classList.add('revealed');
    document.getElementById('subbtn').className = 'subbtn gone';
    revealBrowse(q);
    return;
  }

  const opts = document.getElementById('opts');
  opts.innerHTML = '';

  // Pick OPT_COUNT options, always including the correct one
  const allOpts = q.options.map((txt, i) => ({txt, i}));
  const correct = allOpts[q.correct];
  const distractors = allOpts.filter(o => o.i !== q.correct);
  // shuffle distractors, take (OPT_COUNT-1), then add correct, shuffle again
  const picked = distractors.sort(() => Math.random() - .5).slice(0, OPT_COUNT - 1);
  picked.push(correct);
  picked.sort(() => Math.random() - .5);

  picked.forEach(({txt, i}) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.dataset.idx = i;
    btn.innerHTML = `<div class="otxt">${txt}</div>`;

    // 防误触：touchstart 记录按下时间，touchend 判断是否达到阈值
    let touchStart = 0;
    btn.addEventListener('touchstart', () => { touchStart = Date.now(); }, { passive: true });
    btn.addEventListener('touchend', e => {
      if (Date.now() - touchStart >= OPT_TOUCH_DELAY) onSel(e, i, btn);
    });
    // PC 鼠标点击正常触发（无防误触需求）
    btn.addEventListener('mouseup', e => { if (!('ontouchstart' in window)) onSel(e, i, btn); });

    opts.appendChild(btn);
  });

  document.getElementById('opts-zone').style.display = '';
  document.getElementById('content').classList.remove('revealed');
  document.getElementById('answer-panel').className = 'answer-panel';
  const _nb=document.getElementById('nxtbtn'); _nb.className='nxtbtn'; document.querySelector('.btm').classList.remove('active'); stopNRing();

  // 选项区固定高度
  requestAnimationFrame(() => {
    const gap = 10, pad = 16, n = OPT_COUNT;
    const btnH = 72;
    const zoneH = btnH * n + gap * (n - 1) + pad;
    document.documentElement.style.setProperty('--opts-zone-h', `${zoneH}px`);
    document.documentElement.style.setProperty('--opt-btn-h', `${btnH}px`);
  });

  stopAllPromptTimers();
  // 传入实际显示的选项文字，供选项提示使用
  const pickedTexts = picked.map(({txt}) => txt);
  startCardPrompts(pickedTexts);
}

function revealBrowse(q) {

  document.getElementById('answer-panel').className = 'answer-panel';

// ── Select ─────────────────────────────────────────────────────
function onSel(e, idx, btn) {
  if (revealed) return;

  // ripple
  const r = document.createElement('span');
  const d = Math.max(btn.offsetWidth, btn.offsetHeight);
  const rc = btn.getBoundingClientRect();
  r.className='rpl';
  r.style.cssText=`width:${d}px;height:${d}px;left:${(e.touches?.[0]?.clientX??e.clientX)-rc.left-d/2}px;top:${(e.touches?.[0]?.clientY??e.clientY)-rc.top-d/2}px`;
  btn.appendChild(r); r.addEventListener('animationend',()=>r.remove());

  document.querySelectorAll('.opt').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel'); sel = idx; tone('sel');
  stopAllPromptTimers();

  const q = Qs[qIdx];
  if (idx === q.correct) {
    tone('ok');
    setTimeout(spawnConfetti, 100);
    revealAnswer();
  } else {
    wrongCount++;
    if (wrongCount === 1) {
      btn.style.pointerEvents = 'none';
      sel = null;
      requestAnimationFrame(() => {
        btn.style.transition = 'opacity .3s, transform .3s';
        btn.style.opacity = '0';
        btn.style.transform = 'scale(.9)';
        setTimeout(() => btn.remove(), 300);
      });
      if (WRONG_HINT_ON) speak(PHRASE_WRONG);
    } else {
      revealAnswer();
    }
  }
}

// ── Next ring ──────────────────────────────────────────────────
function startNRing() {
  const dur = currentMode === 'browse' ? BDUR : NDUR;
  if (dur === 0) return;  // 0 = 手动模式，不启动倒计时
  requestAnimationFrame(() => {
    const btn=document.getElementById('nxtbtn'),svg=document.getElementById('nrsvg');
    const nrt=document.getElementById('nrt'),nrp=document.getElementById('nrp'),sec=document.getElementById('nrsec');
    const w=btn.offsetWidth,h=btn.offsetHeight,pad=2;
    if (!w || !h) return;
    btn.classList.add('counting');
    svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
    [nrt,nrp].forEach(el=>{el.setAttribute('x',pad);el.setAttribute('y',pad);el.setAttribute('width',w-pad*2);el.setAttribute('height',h-pad*2);el.setAttribute('rx',20);});
    const r=20,perim=2*((w-2*r)+(h-2*r))+2*Math.PI*r;
    nrt.style.strokeDasharray=perim;nrt.style.strokeDashoffset=0;
    nrp.style.strokeDasharray=perim;nrp.style.strokeDashoffset=perim;
    nStart=performance.now();
    function tick(now){
      const el=now-nStart,p=Math.min(el/dur,1);
      nrp.style.strokeDashoffset=perim*(1-p);
      const rem=Math.ceil((dur-el)/1000);
      sec.textContent=rem>0?rem:'';
      if(p<1){nRaf=requestAnimationFrame(tick);}
      else{sec.textContent='';onNext();}
    }
    nRaf=requestAnimationFrame(tick);
  });
}
function stopNRing(){
  if(nRaf){cancelAnimationFrame(nRaf);nRaf=null;}
  const btn=document.getElementById('nxtbtn');
  if(btn) btn.classList.remove('counting');
  const nrp=document.getElementById('nrp');
  const nrt=document.getElementById('nrt');
  const sec=document.getElementById('nrsec');
  if(nrp){ nrp.style.strokeDasharray=''; nrp.style.strokeDashoffset=''; }
  if(nrt){ nrt.style.strokeDasharray=''; nrt.style.strokeDashoffset=''; }
  if(sec) sec.textContent='';
}

// ── Celebration animations ─────────────────────────────────────
let cRaf = null;

function stopCelebration() {
  if (cRaf) { cancelAnimationFrame(cRaf); cRaf = null; }
  const cv = document.getElementById('cc');
  if (cv) cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
}

function spawnConfetti() {
  const cv = document.getElementById('cc'), ctx = cv.getContext('2d');
  stopCelebration();
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const cols = ['#1d4ed8','#15803d','#f59e0b','#be185d','#7c3aed','#0891b2'];
  const ps = Array.from({length: 60}, () => ({
    x: Math.random() * cv.width, y: -12 - Math.random() * 40,
    vx: (Math.random() - .5) * 5, vy: Math.random() * 2.5 + 1.5,
    color: cols[Math.floor(Math.random() * cols.length)],
    w: Math.random() * 8 + 4, h: Math.random() * 4 + 3,
    rot: Math.random() * 360, rs: (Math.random() - .5) * 7, wb: Math.random() * 3
  }));
  let f = 0;
  (function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    let alive = false;
    ps.forEach(p => {
      p.x += p.vx + Math.sin(f * .05 + p.wb) * .3;
      p.y += p.vy; p.vy += .06; p.rot += p.rs;
      if (p.y < cv.height + 20) alive = true;
      ctx.save();
      ctx.globalAlpha = Math.max(0, 1 - p.y / (cv.height * 1.1));
      ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    f++;
    if (alive) cRaf = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, cv.width, cv.height);
  })();
}

// ── Force refresh (PWA) ───────────────────────────────────────
function forceRefresh() {
  const btn = document.querySelector('.home-refresh-btn');
  if (btn) {
    btn.classList.add('spinning');
    btn.addEventListener('animationend', () => btn.classList.remove('spinning'), { once: true });
  }
  // Clear caches if Service Worker available, then reload
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      Promise.all(regs.map(r => r.unregister())).then(() => {
        if ('caches' in window) {
          caches.keys().then(keys =>
            Promise.all(keys.map(k => caches.delete(k)))
          ).then(() => location.reload(true));
        } else { location.reload(true); }
      });
    });
  } else {
    setTimeout(() => location.reload(true), 400);
  }
}

      {id:'ls-hint',suf:'px',def:'0'},{id:'ls-btn',suf:'px',def:'0'},
    ].forEach(({id,suf,def})=>{
      const el=document.getElementById(id);
      const val=document.getElementById(`${id}-val`);
      const v=localStorage.getItem(id)||def;
      if(el) el.value=v;
      if(val) val.textContent=`${v}${suf}`;
    });
  });
}
loadSettings();

// ── Settings ───────────────────────────────────────────────────
function switchTab(n) {
  document.querySelectorAll('.sheet-tab').forEach((t,i)=>t.classList.toggle('active',i===n));
  document.querySelectorAll('.sheet-panel').forEach((p,i)=>p.classList.toggle('active',i===n));
}
function openSettings(){
  document.getElementById('settings-overlay').classList.add('open');
  // 每次打开时刷新音色列表，确保 iOS 语音包加载后能显示
  populateVoiceList();
}
function closeSettings(){ document.getElementById('settings-overlay').classList.remove('open'); }
function closeSettingsIfOutside(e){ if(e.target===document.getElementById('settings-overlay'))closeSettings(); }

// ── Theme ──────────────────────────────────────────────────────
function toggleTheme(checkbox){
  const isDark=checkbox?checkbox.checked:!document.documentElement.classList.contains('dark');
  document.documentElement.classList.toggle('dark',isDark);
  localStorage.setItem('theme',isDark?'dark':'light');
  const tog=document.getElementById('dark-toggle');if(tog)tog.checked=isDark;
}
(function(){
  const s=localStorage.getItem('theme'),sys=window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark=s?s==='dark':sys;
  if(isDark)document.documentElement.classList.add('dark');
  window.addEventListener('load', async () => {
    const tog=document.getElementById('dark-toggle');if(tog)tog.checked=isDark;
    await restoreDecks();
    renderDeckList();
    updateDeckStats();
    });
})();
